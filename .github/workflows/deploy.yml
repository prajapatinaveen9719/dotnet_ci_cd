name: Deploy .NET API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Stop Running API
        shell: powershell
        run: |
          $connection = Get-NetTCPConnection -LocalPort 5000 -ErrorAction SilentlyContinue
          if ($connection) {
              Stop-Process -Id $connection.OwningProcess -Force
          }

      - name: Restore Packages
        run: dotnet restore
        shell: powershell

      - name: Build Project
        run: dotnet build -c Release --no-restore
        shell: powershell

      - name: Publish API
        run: dotnet publish -c Release -o C:\deploy\dotnet_api
        shell: powershell

      - name: Start API
        shell: powershell
        run: |
          Start-Process dotnet -ArgumentList "C:\deploy\dotnet_api\MonitoringStack.dll"