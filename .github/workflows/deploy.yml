name: .NET CI/CD to IIS

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: self-hosted

    env:
      DEPLOY_PATH: C:\inetpub\monitoring_api
      BACKUP_PATH: C:\inetpub\Backups

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Restore NuGet Packages
        run: dotnet restore MonitoringStack.sln

      - name: Stop IIS AppPool
        shell: powershell
        run: |
          Import-Module WebAdministration
          Stop-WebAppPool -Name "MonitoringStackAPI"

      - name: Backup Old Deployment
        shell: powershell
        run: |
          $Timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
          $BackupFolder = "$env:BACKUP_PATH\MonitoringStack_$Timestamp"

          if (!(Test-Path $env:BACKUP_PATH)) {
              New-Item -Path $env:BACKUP_PATH -ItemType Directory
          }

          if (Test-Path $env:DEPLOY_PATH) {
              Move-Item -Path $env:DEPLOY_PATH -Destination $BackupFolder
              Write-Host "Backup saved to: $BackupFolder"
          }

          New-Item -Path $env:DEPLOY_PATH -ItemType Directory | Out-Null

      - name: Build & Publish
        run: dotnet publish MonitoringStack.csproj -c Release -o $env:DEPLOY_PATH

      - name: Start IIS AppPool
        shell: powershell
        run: |
          Import-Module WebAdministration
          Start-WebAppPool -Name "MonitoringStackAPI"